<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>
    <link rel="stylesheet" href="css/product-detail.css">
</head>
<body>
    <header class="main-header">
            <nav class="nav-left">
                <ul class="menu">
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="shop.html">SHOP</a></li>
            
                    <li class="dropdown">
                        <a href="categories.html">CATEGORIES</a>
                        <ul class="dropdown-content">
                            <li><a href="category-view.html?type=rings">RINGS</a></li>
                            <li><a href="category-view.html?type=chains">CHAINS</a></li>
                            <li><a href="category-view.html?type=bracelets">BRACELETS</a></li>
                            <li><a href="category-view.html?type=earrings">EARRINGS</a></li>
                            <li><a href="category-view.html?type=charms">CHARMS BAR</a></li>
                        </ul>
                    </li>

                    <li><a href="about.html">ABOUT</a></li>
                    <li><a href="contact.html">CONTACT US</a></li>
                </ul>
            </nav>

            <div class="nav-center">
                <div class="search-container">
                    <input type="text" id="global-search" placeholder="Search...">
                    <button type="submit" class="search-btn">🔍</button>
                </div>
            </div>

            <div class="nav-right">
                <a href="wishlist.html" class="icon wishlist-btn">♡</a>
                <a href="login.html" class="icon account-btn">👤 <span id="account-name"></span></a>
                <a href="cart.html" class="icon cart-btn">🛒 <span id="cart-badge">0</span></a>
            </div>
        </header>
    <main class="detail-container">
        <div class="gallery-wrapper">
            <div id="thumb-column" class="thumbnail-column">
                </div>
            <div class="main-display">
                <img id="primary-image" src="" alt="Product Detail">
            </div>
        </div>

        <div class="info-wrapper">
            <h1 id="p-name">Loading...</h1>
            <div class="rating">★★★★★ (temporary hardcorded review)</div> 
            <h2 id="p-price"></h2>

            <div class="desc-box">
                <h3>DESCRIPTION</h3>
                <p id="p-desc"></p>
            </div>

            <div class="color-selection">
                <h3>CHOOSE YOUR COLOR</h3>
                <div class="radio-group">
                    <label class="color-option">
                        <input type="radio" name="jewelry-color" value="gold" onclick="selectColor('Gold')">
                        <span class="swatch gold"></span>
                        <span class="label-text">Gold</span>
                    </label>

                    <label class="color-option">
                        <input type="radio" name="jewelry-color" value="silver" onclick="selectColor('Silver')">
                        <span class="swatch silver"></span>
                        <span class="label-text">Silver</span>
                    </label>

                    <label class="color-option">
                        <input type="radio" name="jewelry-color" value="rose-gold" onclick="selectColor('Rose Gold')">
                        <span class="swatch rose"></span>
                        <span class="label-text">Rose Gold</span>
                    </label>
                </div>
            </div>

                <h3>CHAIN LENGTH</h3>
                <select id="size-dropdown">
                    <option value="">Select Length</option>
                    <option value="16">16 inches</option>
                    <option value="18">18 inches</option>
                    <option value="20">20 inches</option>
                </select>
            </div>

            <div class="buy-actions">
                <button class="add-cart-btn" onclick="handleAddToCart()">PURCHASE ITEM *</button>
                <div class="qty-stepper">
                    <button onclick="changeQty(-1)">-</button>
                    <span id="qty-count">1</span>
                    <button onclick="changeQty(1)">+</button>
                </div>
                <button class="wish-btn">♡</button>
            </div>
            <p id="error-msg" class="error-text">* PLEASE SELECT COLOR AND LENGTH BEFORE ADDING.</p>
        </div>
    </main>

    <script src="js/site-auth.js"></script>
    <script src="js/product-detail.js"></script>
</body>
</html>
