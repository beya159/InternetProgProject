<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Jewelry Website -- Jewelry Deliverable</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <header class="main-header">
            <nav class="nav-left">
                <ul class="menu">
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="shop.html">SHOP</a></li>
            
                    <li class="dropdown">
                        <a href="categories.html">CATEGORIES</a>
                        <ul class="dropdown-content">
                            <li><a href="category-view.html?type=all">SHOP ALL</a></li> 
                            <hr>
                            <li><a href="category-view.html?type=rings">RINGS</a></li>
                            <li><a href="category-view.html?type=chains">CHAINS</a></li>
                            <li><a href="category-view.html?type=bracelets">BRACELETS</a></li>
                            <li><a href="category-view.html?type=earrings">EARRINGS</a></li>
                            <li><a href="category-view.html?type=charms">CHARMS BAR</a></li>
                        </ul>
                    </li>

                    <li><a href="about.html">ABOUT</a></li>
                    <li><a href="contact.html">CONTACT US</a></li>
                </ul>
            </nav>

            <div class="nav-center">
                <div class="search-container">
                    <input type="text" id="global-search" placeholder="Search...">
                    <button type="submit" class="search-btn">🔍</button>
                </div>
            </div>

            <div class="nav-right">
                <a href="wishlist.html" class="icon wishlist-btn">♡</a>
                <a href="login.html" class="icon account-btn">👤 <span id="account-name"></span></a>
                <a href="cart.html" class="icon cart-btn">🛒 <span id="cart-badge">0</span></a>
            </div>
        </header>

        <section class="carousel-container">
            <div class="carousel-slide">
                <div class="slide fade">
                    <img src="images/carousel/carousel1.jpg" alt="Summer Collection">
                    <div class="caption">Elegance in Every Detail</div>
                </div>
                <div class="slide fade">
                    <img src="images/carousel/carousel2.jpg" alt="Handcrafted Gold">
                    <div class="caption">Handcrafted Gold Pieces</div>
                </div>
                <div class="slide fade">
                    <img src="images/carousel/carousel3.jpg" alt="New Arrivals">
                    <div class="caption">Discover New Arrivals</div>
                </div>

                <a class="prev" onclick="moveSlide(-1)">&#10094;</a>
                <a class="next" onclick="moveSlide(1)">&#10095;</a>
            </div>

            <div class="dot-container">
                <span class="dot" onclick="currentSlide(1)"></span>
                <span class="dot" onclick="currentSlide(2)"></span>
                <span class="dot" onclick="currentSlide(3)"></span>
            </div>
        </section>

        <main>
            <h2 id="category-title">OUR COLLECTION</h2>
            <div id="product-grid" class="product-grid"></div>
        </main>

        <script src="js/site-auth.js"></script>
        <script src="js/index.js"></script>
        <script src="js/main.js"></script>

        <div id="quick-shop-modal" class="quick-modal" style="display: none;">
            <div class="quick-modal-content">
                <span class="quick-close" onclick="closeQuickShop()">&times;</span>
                
                <div class="quick-modal-body">
                    <div class="quick-modal-left">
                        <img id="quick-img" src="" alt="Product Image">
                    </div>
                    
                    <div class="quick-modal-right">
                        <h2 id="quick-name"></h2>
                        <p id="quick-price" class="quick-item-price"></p>
                        
                        <label class="quick-label">Select Color:</label>
                        <div class="quick-color-options">
                            <button type="button" class="q-color-btn" onclick="selectQuickColor('Silver')">Silver</button>
                            <button type="button" class="q-color-btn" onclick="selectQuickColor('Gold')">Gold</button>
                            <button type="button" class="q-color-btn" onclick="selectQuickColor('Rose Gold')">Rose Gold</button>
                        </div>

                        <label class="quick-label" for="quick-length">Select Chain Length:</label>
                        <select id="quick-length">
                            <option value="" disabled selected>Choose length...</option>
                            <option value="16">16 inches</option>
                            <option value="18">18 inches</option>
                            <option value="20">20 inches</option>
                        </select>

                        <div id="quick-error-msg" class="status-message error" style="display: none; color: red; margin: 10px 0;"></div>

                        <button class="quick-add-btn" onclick="addQuickToCart()">ADD TO BAG</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
