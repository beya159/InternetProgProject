<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/checkout.css">
</head>
<body>
    <main class="checkout-main">
        <section class="checkout-card">
            <div class="checkout-header">
                <div>
                    <p class="eyebrow">Front-end Checkout</p>
                    <h1>Secure Checkout</h1>
                </div>
                <a class="ghost-link" href="cart.html">Back to cart</a>
            </div>

            <div id="status" class="status-message"></div>

            <div class="checkout-grid">
                <section class="checkout-panel summary-panel">
                    <h2>Order Summary</h2>
                    <div id="order-items" class="order-items"></div>
                    <div class="totals">
                        <div><span>Subtotal</span><span id="subtotal-amount">$0.00</span></div>
                        <div><span>Shipping</span><span>FREE</span></div>
                        <div class="grand-total"><span>Total</span><span id="final-total">$0.00</span></div>
                    </div>
                </section>

                <section class="checkout-panel form-panel">
                    <h2>Delivery Details</h2>
                    <form id="checkout-form" novalidate>
                        <label for="full-name">Full Name</label>
                        <input type="text" id="full-name" name="full-name" required>

                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>

                        <label for="address">Address</label>
                        <input type="text" id="address" name="address" required>

                        <label for="city">City</label>
                        <input type="text" id="city" name="city" required>

                        <label for="card-number">Card Number</label>
                        <input type="text" id="card-number" name="card-number" maxlength="19" required>

                        <label for="expiry">Expiry</label>
                        <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required>

                        <button type="submit">Place order</button>
                    </form>
                </section>
            </div>
        </section>
    </main>

    <script src="js/site-auth.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
