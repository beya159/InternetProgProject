<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <main class="login-main">
        <div class="register-banner">
            <div>
                <p class="register-eyebrow">New here?</p>
                <h3>Create an account</h3>
                <p>Use the registration form to set up your profile before logging in.</p>
            </div>
            <a class="register-button" href="register.html">Create account</a>
        </div>

        <h2>Account Login</h2>
        <p class="page-lead">Sign in with your ReqRes credentials to access your cart, checkout, and profile.</p>
        
        <div id="status"></div>
        
        <form id="login-form" method="POST" action="">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email" required>
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
                <div class="remember-me-container" style="margin: 15px 0; text-align: left; font-size: 0.9rem; display: flex; align-items: center; gap: 10px;">
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="checkbox" id="remember-me"> Remember me
                    </label>
                    <span id="days-wrapper" style="display: none; align-items: center; gap: 5px;">
                        for 
                        <input type="number" id="remember-days" value="7" min="1" max="365" style="width: 50px; padding: 2px 5px; border: 1px solid #000; text-align: center;"> 
                        days
                    </span>
                </div>

<script>
    document.getElementById('remember-me').addEventListener('change', function() {
        document.getElementById('days-wrapper').style.display = this.checked ? 'inline-flex' : 'none';
    });
</script>
            <button type="submit">Log in</button>
        </form>

        <div id="logged-in-cta" class="logged-in-cta" style="display:none;">
            <a class="secondary-link" href="profile.html">Go to profile</a>
            <a class="secondary-link" href="index.html">Continue shopping</a>
        </div>
        
        <button id="logout-btn" style="display:none;">Log out</button>
    </main>

    <script src="../js/site-auth.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
