<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Shopping Cart</title>
    <link rel="stylesheet" href="../css/cart.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="main-header">
        <nav class="nav-left">
            <ul class="menu">
                <img src="../images/logo/logo.png" alt="Jewelry Deliverable Logo" class="logo-img">
                <li><a href="index.html">HOME</a></li>
                <li class="dropdown">
                    <a href="categories.html">CATEGORIES</a>
                    <ul class="dropdown-content">
                        <li><a href="category-view.html?type=all">SHOP ALL</a></li> 
                        <hr>
                        <li><a href="category-view.html?type=rings">RINGS</a></li>
                        <li><a href="category-view.html?type=chains">CHAINS</a></li>
                        <li><a href="category-view.html?type=bracelets">BRACELETS</a></li>
                        <li><a href="category-view.html?type=earrings">EARRINGS</a></li>
                        <li><a href="category-view.html?type=charms">CHARMS BAR</a></li>
                    </ul>
                </li>

                <li><a href="about.html">ABOUT</a></li>
                <li><a href="contact.html">CONTACT US</a></li>
            </ul>
        </nav>
            <div class="nav-center">
                <div class="search-container">
                    <input type="text" id="global-search" placeholder="Search..." onkeyup="auto_complete_products(this)">
                    <button type="submit" class="search-btn">🔍</button>
                    <div id="autocomplete" class="hidden">
                        <ul></ul>
                    </div>
                </div>
            </div>
            </div>
        <div class="nav-right">
            <a href="wishlist.html" class="icon wishlist-btn">♡</a>
            <a href="login.html" class="icon account-btn">👤 <span id="account-name"></span></a>
            <a href="cart.html" class="icon cart-btn">🛒 <span id="cart-badge">0</span></a>
        </div>
    </header>
    <main class="cart-container">
        <h1>YOUR SHOPPING BAG</h1>
        <div id="cart-wrapper">
            <div id="cart-items-list" class="items-column"></div>
            <div class="cart-summary">
                <h3>ORDER SUMMARY</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal-amount">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Estimated Tax (15%)</span>
                    <span id="tax-amount">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>FREE</span>
                </div>
                <hr>
                <div class="summary-row total">
                    <span>TOTAL</span>
                    <span id="final-total">$0.00</span>
                </div>
                <button class="checkout-btn" onclick="proceedToCheckout()">CHECKOUT</button>
            </div>
        </div>
    </main>

   <div id="edit-modal" class="quick-modal" style="display: none;">
        <div class="quick-modal-content">
            <span class="quick-close" onclick="closeEditModal()">&times;</span>
            <div class="quick-modal-body">
                <div class="quick-modal-left">
                    <img id="edit-img" src="" width="200">
                </div>
                <div class="quick-modal-right">
                    <h2 id="edit-name"></h2>
                    <p id="edit-price" style="font-weight: bold; margin-bottom: 15px;"></p>
                    
                    <div id="edit-length-area" style="margin-bottom: 10px; display: none;">
                        <label style="font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px;">SELECT LENGTH:</label>
                        <select id="edit-length" style="width: 100%; padding: 8px; margin-bottom: 10px;">
                            <option value="">Select Length...</option>
                            <option value="16">16 inches</option>
                            <option value="18">18 inches</option>
                            <option value="20">20 inches</option>
                        </select>
                    </div>

                    <div class="quick-qty-area" style="margin-bottom: 20px;">
                        <label style="font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px;">QUANTITY:</label>
                        <div class="qty-counter-wrapper" style="display: flex; align-items: center; gap: 5px;">
                            <button type="button" class="qty-adjust-btn" onclick="adjustEditQty(-1)" style="padding: 6px 12px; border-radius: 6px; border: 1px solid #cfc4ec; background: #fff; cursor: pointer; font-weight: bold;">-</button>
                            <input type="number" id="edit-quantity" value="1" min="1" readonly style="width: 50px; text-align: center; padding: 6px; border: 1px solid #dcd3f2; border-radius: 6px; font-weight: bold; background: #fff;">
                            <button type="button" class="qty-adjust-btn" onclick="adjustEditQty(1)" style="padding: 6px 12px; border-radius: 6px; border: 1px solid #cfc4ec; background: #fff; cursor: pointer; font-weight: bold;">+</button>
                        </div>
                    </div>

                    <p id="edit-error-msg" style="color: red; display: none; font-size: 12px; margin-bottom: 10px;"></p>
                    <button class="quick-add-btn" onclick="saveCartEdit()">UPDATE ITEM</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/site-auth.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
