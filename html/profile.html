<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/profile.css">
</head>
<body>
    <main class="profile-main">
        <section class="profile-card">
            <div class="profile-header">
                <div>
                    <p class="eyebrow">ReqRes Profile</p>
                    <h1>My Profile</h1>
                </div>
                <button id="logout-btn" class="ghost-button" type="button">Log out</button>
            </div>

            <div id="status" class="status-message"></div>

            <div class="profile-grid">
                <section class="profile-panel api-panel">
                    <h2>Profile Summary</h2>
                    <div class="profile-meta">
                        <p id="api-name"></p>
                        <p id="api-email"></p>
                        <p id="api-company"></p>
                    </div>
                </section>

                <section class="profile-panel form-panel">
                    <h2>Edit Details</h2>
                    <form id="profile-form" novalidate>
                        <label for="display-name">Display Name</label>
                        <input type="text" id="display-name" name="display-name" required>

                        <label for="profile-email">Email</label>
                        <input type="email" id="profile-email" name="profile-email" required>

                        <label for="phone">Phone</label>
                        <input type="text" id="phone" name="phone" placeholder="Optional">

                        <label for="city">City</label>
                        <input type="text" id="city" name="city" placeholder="Optional">

                        <button type="submit">Save to cookie</button>
                    </form>
                </section>
            </div>

            <div class="profile-actions">
                <a href="index.html">Continue shopping</a>
                <a href="cart.html">View cart</a>
            </div>
        </section>
    </main>

    <script src="js/site-auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
