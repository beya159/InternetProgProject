<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Category View</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <header class="main-header">
            <nav class="nav-left">
                <ul class="menu">
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="shop.html">SHOP</a></li>
            
                    <li class="dropdown">
                        <a href="categories.html">CATEGORIES</a>
                        <ul class="dropdown-content">
                            <li><a href="category-view.html?type=rings">RINGS</a></li>
                            <li><a href="category-view.html?type=chains">CHAINS</a></li>
                            <li><a href="category-view.html?type=bracelets">BRACELETS</a></li>
                            <li><a href="category-view.html?type=earrings">EARRINGS</a></li>
                            <li><a href="category-view.html?type=charms">CHARMS BAR</a></li>
                            <li><a href="category-view.html?type=belly-chains">BELLY CHAINS</a></li>
                        </ul>
                    </li>

                    <li><a href="about.html">ABOUT</a></li>
                    <li><a href="contact.html">CONTACT US</a></li>
                </ul>
            </nav>

            <div class="nav-center">
                <div class="search-container">
                    <input type="text" id="global-search" placeholder="Search...">
                    <button type="submit" class="search-btn">🔍</button>
                </div>
            </div>

            <div class="nav-right">
                <a href="#" class="icon wishlist-btn">♡</a>
                <a href="login.html" class="icon account-btn">👤</a>
                <a href="cart.html" class="icon cart-btn">🛒 <span id="cart-badge">0</span></a>
            </div>
        </header>

        <div class="category-header">
            <div class="header-top">
                <h1 id="cat-name-display">CATEGORY NAME</h1>
                <span id="item-count">0 ITEMS</span>
            </div>
            <p id="cat-description">[Description goes here]</p>
            <hr>
        </div>

        <section class="list-container">
            <aside class="sidebar">
                <h3>PRICE</h3>
                <div class="filter-group">[RANGE SLIDER]</div>

                <h3>COLOUR</h3>
                <div class="filter-group">
                    <input type="radio" name="color" value="silver"> Silver<br>
                    <input type="radio" name="color" value="gold"> Gold<br>
                    <input type="radio" name="color" value="rose-gold"> Rose Gold
                </div>

                <h3>STYLE</h3>
                <div class="filter-group">
                    <input type="radio" name="style" value="feminine"> Feminine<br>
                    <input type="radio" name="style" value="masculine"> Masculine<br>
                    <input type="radio" name="style" value="all" checked> All
                </div>
            </aside>

            <main class="content-area">
                <div class="toolbar">
                    <span>FILTER</span>
                    <select class="sort-dropdown">
                        <option>DROPDOWN LIST</option>
                        <option>Price: Low to High</option>
                        <option>Price: High to Low</option>
                    </select>
                </div>
                
                <div id="product-grid" class="product-grid">
                    </div>
            </main>
        </section>

        <script src="js/category-logic.js"></script>
    </body>
</html>
